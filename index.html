<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="what shows up on search engine">
    <title>Telephone Number Validator</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main>
      <img src="https://cdn.freecodecamp.org/platform/universal/fcc_primary.svg">
      <h1>Telephone Number Validator</h1>
      <div class="phone">
        <div class="small-circle"></div>
        <div class="screen">
          <h2>Enter a Phone Number:</h2>
          <input class="validator-input" id="user-input">
          <p id="results-div"></p>
        </div>
        <div class="phone-footer">
          <button class="btn-styles" id="check-btn">Check</button>
          <button class="btn-styles" id="clear-btn">Clear</button>
        </div>
      </div>
    </main>
    <script src="./script.js"></script>
  </body>
</html>
